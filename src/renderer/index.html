<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbis XMB</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="booting">
    <div id="boot"><span class="boot-brand">ORBIS</span><span class="boot-sub">XMB PS3 Open-source</span></div>
    <div class="stars"></div>
    <svg class="xmb-waves" viewBox="0 0 1920 1080" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <filter id="bodyGlow" x="-20%" y="-120%" width="140%" height="340%">
          <feGaussianBlur stdDeviation="3.4" />
        </filter>
      </defs>
    </svg>

    <header>
      <span class="brand">ORBIS</span>
      <span class="header-right">
        <button id="header-install" class="icon-button" title="Instalar PKG ou RAP" aria-label="Instalar PKG ou RAP">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5.5 12 2l7 3.5v8L12 17l-7-3.5v-8Zm0 0 7 3.5m7-3.5L12 9m0 0v8m-3 2h6m-3-4v7"/></svg>
        </button>
        <button id="header-refresh" class="icon-button" title="Atualizar biblioteca" aria-label="Atualizar biblioteca">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 7v5h-5M5 17v-5h5m8.2-3A7 7 0 0 0 6.4 6.4L5 8m.8 7A7 7 0 0 0 17.6 17l1.4-2"/></svg>
        </button>
        <button id="header-settings" class="icon-button" title="Configurações" aria-label="Configurações">⚙</button>
        <span class="clock" id="clock"></span>
      </span>
    </header>
    <main id="app"></main>
    <div id="install-overlay" class="install-overlay" hidden></div>
    <div id="game-actions-overlay" class="game-actions-overlay" hidden></div>
    <footer><span>✕ Iniciar / Selecionar</span><span>○ Voltar</span><span>△ Opções</span><span>START Atualizar</span><span>SELECT + START Sair</span></footer>
    <script src="renderer.js"></script>
  </body>
</html>
